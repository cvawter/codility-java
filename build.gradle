plugins {
    id 'java'
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main']
        }
        resources {
            srcDirs = ['src/main']
        }
    }
}

application {
    mainClass = project.findProperty('mainClass') ?: 'main.codility.lesson.one.Iterations.BinaryGap.Solution'
}

tasks.named('run') {
    standardInput = System.in
}
